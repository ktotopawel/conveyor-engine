plugins {
    id 'java'
    id 'application'
}

group = 'com.ktotopawel'
version = 'unspecified'

repositories {
    mavenCentral()
}

dependencies {
    implementation("io.javalin:javalin:7.2.2")
    implementation("ch.qos.logback:logback-classic:1.5.32")
    implementation project(":conveyor-core")
}

application {
    mainClass = 'com.ktotopawel.Main'
}

test {
    useJUnitPlatform()
}

