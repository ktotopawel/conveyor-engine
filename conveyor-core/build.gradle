plugins {
    id 'java-library'
}

group = 'com.ktotopawel'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation("ch.qos.logback:logback-classic:1.5.32")
    implementation("org.slf4j:slf4j-api:2.0.18")
    api("org.jdbi:jdbi3-core:3.53.0")
    api("org.jdbi:jdbi3-sqlobject:3.53.0")
    api("org.jdbi:jdbi3-postgres:3.53.0")
    compileOnly("org.projectlombok:lombok:1.18.46")
    annotationProcessor("org.projectlombok:lombok:1.18.46")
    api("com.zaxxer:HikariCP:7.0.2")
    api("tools.jackson.core:jackson-core:3.1.1")
    api("org.jdbi:jdbi3-json:3.53.0")
    api("org.jdbi:jdbi3-jackson3:3.53.0")
}

test {
    useJUnitPlatform()
}