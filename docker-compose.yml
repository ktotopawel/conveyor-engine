version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: my_project_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Passwordzaq123
      POSTGRES_DB: jobqueue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./jobs_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobqueue_db"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/jobqueue_db
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=Passwordzaq123
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - postgres
      - api
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/jobqueue_db
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=Passwordzaq123
      - API_HOST=http://api:8000
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
